<style>
  :root {
    --pitch:   #08080D;
    --lift:    #13131A;
    --bone:    #EDE6D5;
    --bone-dim: rgba(237,230,213,0.55);
    --flare:   #FF2A1A;
    --acid:    #D8FF00;
    --plasma:  #6A2EFF;
    --font-display: 'Bricolage Grotesque', ui-sans-serif, sans-serif;
    --font-mono:    'Azeret Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--pitch);
    color: var(--bone);
    font-family: var(--font-mono);
    overflow: hidden;
    height: 100%; width: 100%;
    cursor: none;
    overscroll-behavior: none;
  }

  canvas { display: block; touch-action: none; }
  #scene { position: fixed; inset: 0; z-index: 1; }

  /* UI */
  .ui { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
  .ui > * { pointer-events: auto; }

  .ui .brand {
    position: absolute;
    top: clamp(18px, 3vw, 32px);
    left: clamp(18px, 3vw, 32px);
    display: flex; flex-direction: column; gap: 6px;
    margin: 0;
    font-weight: 400;
  }
  .ui .brand .t1 {
    display: block;
    font-family: var(--font-display);
    font-variation-settings: "wdth" 85, "wght" 800;
    font-size: clamp(28px, 4.5vw, 52px);
    letter-spacing: -0.03em;
    line-height: 0.9;
    color: var(--bone);
  }
  .ui .brand .t1 em {
    font-style: normal;
    color: var(--flare);
    font-variation-settings: "wdth" 100, "wght" 800;
  }
  .ui .brand .t2 {
    display: block;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--bone-dim);
    margin-top: 4px;
  }

  .ui .corner-tr .idx {
    text-align: right;
    display: flex; flex-direction: column; gap: 2px;
  }
  .ui .corner-tr .idx-t1 {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--acid);
  }
  .ui .corner-tr .idx-t2 {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--bone-dim);
  }

  .ui .corner-tr {
    position: absolute;
    top: clamp(18px, 3vw, 32px);
    right: clamp(18px, 3vw, 32px);
    display: flex; gap: 10px; align-items: center;
  }
  .ui button {
    appearance: none;
    background: transparent;
    border: 1px solid var(--bone-dim);
    color: var(--bone);
    font: inherit;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 9px 14px;
    cursor: none;
    transition: border-color 120ms, color 120ms, background 120ms;
  }
  .ui button:hover { border-color: var(--acid); color: var(--acid); }

  /* bottom hint */
  .hud {
    position: absolute;
    left: 0; right: 0;
    bottom: clamp(18px, 3vw, 32px);
    display: flex; justify-content: center; gap: 20px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--bone);
    text-transform: uppercase;
  }
  .hud b { color: var(--acid); font-weight: 400; }
  .hud .sep { color: #2A2631; }

  /* vertical progress indicator on right edge */
  .stack-indicator {
    position: absolute;
    right: clamp(24px, 4vw, 56px);
    top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 14px;
    align-items: center;
  }
  .stack-indicator .line {
    width: 1px; height: 110px;
    background: linear-gradient(to bottom,
      transparent, rgba(237,230,213,0.3) 20%,
      rgba(237,230,213,0.3) 80%, transparent);
    position: relative;
  }
  .stack-indicator .head {
    position: absolute;
    top: 0; left: 50%;
    width: 14px; height: 2px;
    background: var(--acid);
    transform: translateX(-50%);
    transition: top 180ms cubic-bezier(.2,.9,.3,1);
    box-shadow: 0 0 12px var(--acid);
  }
  .stack-indicator .dots {
    display: flex; flex-direction: column; gap: 28px;
    margin-top: 8px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.2em;
    color: var(--bone-dim);
    align-items: flex-end;
  }
  .stack-indicator .dots span { transition: color 120ms, opacity 120ms; }
  .stack-indicator .dots span.active { color: var(--acid); }
  .stack-indicator .dots span.about { color: var(--plasma); opacity: 0.55; }
  .stack-indicator .dots span.about.active { color: var(--plasma); opacity: 1; }

  /* centered primary hint */
  .hint-center {
    position: fixed;
    left: 50%;
    top: 48%;
    transform: translate(-50%, -50%);
    z-index: 5;
    pointer-events: none;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    text-align: center;
    opacity: 0;
    transition: opacity 500ms ease;
  }
  .hint-center.show { opacity: 0.92; }
  .hint-center .h1 {
    font-family: var(--font-display);
    font-variation-settings: "wdth" 85, "wght" 700;
    font-size: clamp(26px, 4vw, 44px);
    letter-spacing: -0.01em;
    line-height: 1;
    text-transform: uppercase;
    color: var(--bone);
  }
  .hint-center .h1 em {
    font-style: normal;
    color: var(--acid);
    font-variation-settings: "wdth" 100, "wght" 700;
  }
  .hint-center .h2 {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--bone-dim);
    text-transform: uppercase;
  }
  .hint-center .bounce-y {
    margin-top: 10px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: var(--acid);
    animation: bob 2s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(-4px); opacity: 0.4; }
    50% { transform: translateY(4px); opacity: 1; }
  }
  .hint-center .bounce-y svg { width: 18px; height: 36px; }

  /* click ripple */
  .ripple {
    position: fixed;
    width: 18px; height: 18px;
    border: 1px solid var(--acid);
    border-radius: 50%;
    pointer-events: none;
    z-index: 198;
    transform: translate(-50%, -50%);
    animation: ripple 420ms ease-out forwards;
  }
  @keyframes ripple {
    0%   { opacity: 0.9; width: 8px;  height: 8px;  border-width: 2px; }
    100% { opacity: 0;   width: 80px; height: 80px; border-width: 0.5px; }
  }

  /* boot */
  #boot {
    position: fixed; inset: 0;
    z-index: 100;
    background: var(--pitch);
    display: grid; place-items: center;
    transition: opacity 500ms ease, visibility 500ms;
  }
  #boot.done { opacity: 0; visibility: hidden; }
  #boot .t {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--bone-dim);
    text-transform: uppercase;
  }
  #boot .t::after {
    content: "...";
    display: inline-block;
    animation: ellip 1.2s steps(4) infinite;
    width: 16px; text-align: left;
  }
  @keyframes ellip {
    0% { content: "."; } 33% { content: ".."; } 66% { content: "..."; } 100% { content: "."; }
  }

  /* custom cursor */
  #cursor {
    position: fixed;
    top: 0; left: 0;
    width: 28px; height: 28px;
    pointer-events: none;
    z-index: 200;
    transform: translate(-50%, -50%);
    mix-blend-mode: screen;
    will-change: transform;
  }
  #cursor svg { width: 100%; height: 100%; display: block; }
  #cursor .ring  { stroke: var(--acid); fill: none; stroke-width: 1.4; transition: all 150ms ease; }
  #cursor .cross { stroke: var(--acid); stroke-width: 1.2; transition: opacity 150ms, transform 150ms; transform-origin: center; }
  #cursor.hover .ring { r: 13; fill: rgba(216,255,0,0.1); }
  #cursor.hover .cross { opacity: 0; }
  #cursor.grab  .ring { r: 9; fill: var(--acid); stroke: var(--acid); }
  #cursor.grab  .cross { stroke: var(--pitch); transform: scale(0.5); opacity: 1; }

  #cursor-trail { position: fixed; inset: 0; z-index: 199; pointer-events: none; mix-blend-mode: screen; }

  @media (max-width: 760px) {
    .stack-indicator { right: 14px; }
    .stack-indicator .line { height: 76px; }
    .stack-indicator .dots { gap: 20px; font-size: 9.5px; }
    .hud { font-size: 9.5px; gap: 12px; padding: 0 16px; text-align: center; flex-wrap: wrap; }
  }

  @media (prefers-reduced-motion: reduce) {
    .hint-center .bounce-y { animation: none; }
    .stack-indicator .head { transition: none; }
  }
</style>

<script type="module">
import * as THREE from 'three';
import { EffectComposer }   from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }       from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass }  from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass }       from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass }       from 'three/addons/postprocessing/OutputPass.js';

// ----- palette -----
const C = {
  pitch:  '#08080D',
  lift:   '#13131A',
  bone:   '#EDE6D5',
  boneDim:'#8C877B',
  flare:  '#FF2A1A',
  flareDim:'#8F1A11',
  acid:   '#D8FF00',
  plasma: '#6A2EFF',
};

// ----- content -----
const ENTRIES = [
  {
    year: '2026',
    name: 'ETHGLOBAL',
    name2:'CANNES',
    meta: 'CÔTE D’AZUR · JUILLET',
    num:  'N° 2026·01',
    href: 'https://ethglobal.com/events/cannes',
    tone: 'flare',
    project: 'Oh Snap!',
    achievements: ['FINALIST', 'METAMASK WINNER'],
  },
  {
    year: '2025',
    name: '[PLACEHOLDER]',
    name2:'ENTRY · 02',
    meta: 'LOCATION & HOST TBC',
    num:  'N° 2025·02',
    href: '#',
    tone: 'bone',
    project: null,
    achievements: [],
  },
  {
    year: '2025',
    name: '[PLACEHOLDER]',
    name2:'ENTRY · 03',
    meta: 'LOCATION & HOST TBC',
    num:  'N° 2025·03',
    href: '#',
    tone: 'acid',
    project: null,
    achievements: [],
  },
  {
    type: 'about',
    year: '—',
    name: 'ALEXANDRE',
    name2:'TSETSKHLADZE',
    meta: 'BUILDER · TBILISI',
    num:  '— THE PERSON —',
    href: 'mailto:atsetsoffc@gmail.com',
    tone: 'plasma',
    project: 'Build. Win. Ship.',
    achievements: ['GITHUB  @handle', 'TWITTER @handle', 'MAIL →  inbox'],
  },
];

// ----- wait for fonts -----
await document.fonts.ready;
await Promise.all([
  document.fonts.load('800 380px "Bricolage Grotesque"'),
  document.fonts.load('700 84px  "Bricolage Grotesque"'),
  document.fonts.load('italic 700 58px "Bricolage Grotesque"'),
  document.fonts.load('500 24px  "Azeret Mono"'),
  document.fonts.load('700 32px  "Azeret Mono"'),
]).catch(() => {});

// ----- poster face texture -----
function makePosterTexture(entry) {
  const W = 1024, H = 1536;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const g = c.getContext('2d');

  // base fill by tone
  const tones = {
    flare:  { bg: '#0E0B14', accent: C.flare,  type: C.bone,    sub: '#FF7A6E' },
    bone:   { bg: C.bone,    accent: C.flare,  type: '#07060B', sub: '#141018' },
    acid:   { bg: '#0B0B0D', accent: C.acid,   type: C.bone,    sub: '#FFD13D' },
    plasma: { bg: '#0B0817', accent: C.plasma, type: C.bone,    sub: '#9C7CFF' },
  };
  const t = tones[entry.tone];

  g.fillStyle = t.bg;
  g.fillRect(0, 0, W, H);

  // paper grain
  const ng = g.createRadialGradient(W*0.3, H*0.2, 50, W/2, H/2, Math.max(W,H));
  ng.addColorStop(0, 'rgba(255,255,255,0.03)');
  ng.addColorStop(1, 'rgba(0,0,0,0.12)');
  g.fillStyle = ng;
  g.fillRect(0, 0, W, H);
  for (let i = 0; i < 3800; i++) {
    const a = Math.random();
    g.fillStyle = `rgba(${entry.tone==='bone'?0:255},${entry.tone==='bone'?0:255},${entry.tone==='bone'?0:255},${a*0.025})`;
    g.fillRect(Math.random()*W, Math.random()*H, 1, 1);
  }

  // ======== motif ========
  g.save();
  if (entry.tone === 'flare') {
    // diagonal stripes
    g.strokeStyle = t.accent;
    g.globalAlpha = 0.09;
    g.lineWidth = 40;
    for (let x = -H; x < W + H; x += 64) {
      g.beginPath(); g.moveTo(x, 0); g.lineTo(x + H, H); g.stroke();
    }
  } else if (entry.tone === 'bone') {
    // concentric arcs, bottom-right
    g.strokeStyle = t.accent;
    g.globalAlpha = 0.14;
    for (let r = 40; r <= 900; r += 70) {
      g.lineWidth = r % 140 === 0 ? 2 : 1;
      g.beginPath(); g.arc(W, H, r, Math.PI, Math.PI * 1.5); g.stroke();
    }
  } else if (entry.tone === 'acid') {
    // halftone dot grid
    g.globalAlpha = 0.18;
    g.fillStyle = t.accent;
    const step = 28;
    for (let y = 60; y < H; y += step) {
      for (let x = 60; x < W; x += step) {
        const d = Math.hypot(x - W*0.3, y - H*0.7) / Math.hypot(W, H);
        const r = Math.max(0, 4 * (1 - d * 1.2));
        if (r > 0.3) { g.beginPath(); g.arc(x, y, r, 0, Math.PI*2); g.fill(); }
      }
    }
  } else if (entry.tone === 'plasma') {
    // starfield — scattered plasma dots of varying sizes + a few larger "stars" with cross-spark
    const rand = (seed) => {
      let s = seed; return () => { s = (s*9301 + 49297) % 233280; return s / 233280; };
    };
    const r1 = rand(7);
    g.fillStyle = t.accent;
    for (let i = 0; i < 260; i++) {
      const x = r1() * W, y = r1() * H;
      const rr = r1();
      const sz = rr < 0.85 ? 0.8 + rr * 1.2 : 1.6 + rr * 4;
      g.globalAlpha = 0.15 + rr * 0.55;
      g.beginPath(); g.arc(x, y, sz, 0, Math.PI*2); g.fill();
    }
    // a few "bright" stars with cross sparks
    for (let i = 0; i < 6; i++) {
      const x = 120 + r1() * (W - 240);
      const y = 320 + r1() * (H - 520);
      g.globalAlpha = 0.9;
      g.fillStyle = t.accent;
      g.beginPath(); g.arc(x, y, 3.5, 0, Math.PI*2); g.fill();
      g.strokeStyle = t.accent;
      g.lineWidth = 1;
      g.globalAlpha = 0.55;
      g.beginPath();
      g.moveTo(x - 14, y); g.lineTo(x + 14, y);
      g.moveTo(x, y - 14); g.lineTo(x, y + 14);
      g.stroke();
    }
    g.globalAlpha = 1;
  }
  g.restore();

  // ======== border frame ========
  g.strokeStyle = t.type;
  g.globalAlpha = 0.25;
  g.lineWidth = 2;
  g.strokeRect(32, 32, W - 64, H - 64);
  g.globalAlpha = 1;

  // ======== header row ========
  g.fillStyle = t.type;
  g.font = '500 22px "Azeret Mono", monospace';
  g.textBaseline = 'top';
  g.textAlign = 'left';
  g.fillText('ALEXANDRE TSETSKHLADZE', 64, 276);
  g.textAlign = 'right';
  g.fillText(entry.num, W - 64, 276);

  // hairline under header
  g.lineWidth = 1;
  g.globalAlpha = 0.25;
  g.beginPath(); g.moveTo(64, 322); g.lineTo(W - 64, 322); g.stroke();
  g.globalAlpha = 1;

  // ======== YEAR (or HELLO for about) ========
  if (entry.type === 'about') {
    // italic lowercase "Hello." with plasma period
    g.font = 'italic 800 300px "Bricolage Grotesque", sans-serif';
    g.textAlign = 'left';
    g.textBaseline = 'alphabetic';
    const hello = 'Hello';
    const dot = '.';
    const helloW = g.measureText(hello).width;
    const dotW   = g.measureText(dot).width;
    const totalW = helloW + dotW;
    const startX = W/2 - totalW/2;
    g.fillStyle = t.type;
    g.fillText(hello, startX, 640);
    g.fillStyle = t.accent;
    g.fillText(dot, startX + helloW, 640);
  } else {
    g.fillStyle = t.accent;
    g.font = '800 380px "Bricolage Grotesque", sans-serif';
    g.textAlign = 'center';
    g.textBaseline = 'alphabetic';
    g.fillText(entry.year, W/2, 660);
    g.globalAlpha = 0.16;
    g.fillText(entry.year, W/2 + 8, 668);
    g.globalAlpha = 1;
  }

  // ======== hackathon name ========
  g.fillStyle = t.type;
  g.font = '700 84px "Bricolage Grotesque", sans-serif';
  g.textAlign = 'left';
  g.textBaseline = 'alphabetic';
  g.fillText(entry.name,  80, 790);
  g.fillText(entry.name2, 80, 882);

  // meta
  g.fillStyle = t.type;
  g.globalAlpha = 0.55;
  g.font = '500 24px "Azeret Mono", monospace';
  g.fillText(entry.meta, 80, 928);
  g.globalAlpha = 1;

  // ----- hairline -----
  g.strokeStyle = t.type;
  g.globalAlpha = 0.22;
  g.lineWidth = 1;
  g.beginPath(); g.moveTo(80, 972); g.lineTo(W - 80, 972); g.stroke();
  g.globalAlpha = 1;

  // ======== PROJECT / TAGLINE ========
  g.fillStyle = t.type;
  g.globalAlpha = 0.5;
  g.font = '500 19px "Azeret Mono", monospace';
  g.textBaseline = 'alphabetic';
  g.textAlign = 'left';
  g.fillText(entry.type === 'about' ? 'TAGLINE —' : 'PROJECT —', 80, 1004);
  g.globalAlpha = 1;

  if (entry.project) {
    g.fillStyle = t.type;
    g.font = 'italic 700 58px "Bricolage Grotesque", sans-serif';
    g.fillText(entry.project, 80, 1068);
  } else {
    g.fillStyle = t.type;
    g.globalAlpha = 0.28;
    g.font = '500 34px "Azeret Mono", monospace';
    g.fillText('—', 80, 1062);
    g.globalAlpha = 1;
  }

  // ----- hairline -----
  g.globalAlpha = 0.22;
  g.beginPath(); g.moveTo(80, 1108); g.lineTo(W - 80, 1108); g.stroke();
  g.globalAlpha = 1;

  // ======== AWARDS / REACH ========
  g.fillStyle = t.type;
  g.globalAlpha = 0.5;
  g.font = '500 19px "Azeret Mono", monospace';
  g.fillText(entry.type === 'about' ? 'REACH —' : 'AWARDS —', 80, 1140);
  g.globalAlpha = 1;

  if (entry.achievements.length > 0) {
    entry.achievements.forEach((award, i) => {
      const y = 1192 + i * 54;
      // accent diamond marker
      g.fillStyle = t.accent;
      g.beginPath();
      g.moveTo(92, y - 14);
      g.lineTo(108, y - 24);
      g.lineTo(124, y - 14);
      g.lineTo(108, y - 4);
      g.closePath();
      g.fill();
      // award text
      g.fillStyle = t.type;
      g.font = '700 32px "Azeret Mono", monospace';
      g.textBaseline = 'alphabetic';
      g.fillText(award, 144, y - 5);
    });
  } else {
    g.fillStyle = t.type;
    g.globalAlpha = 0.28;
    g.font = '500 32px "Azeret Mono", monospace';
    g.fillText('—', 80, 1200);
    g.globalAlpha = 1;
  }

  // CTA (acid pill)
  const ctaY = 1372, ctaH = 92;
  g.fillStyle = t.accent;
  g.fillRect(80, ctaY, W - 160, ctaH);

  g.fillStyle = entry.tone === 'bone' ? C.bone : C.pitch;
  g.font = '700 44px "Bricolage Grotesque", sans-serif';
  g.textBaseline = 'middle';
  g.textAlign = 'center';
  const ctaLabel = entry.type === 'about'
    ? 'SAY HELLO  →'
    : entry.href === '#' ? '[ PENDING ]' : 'ENTER  →';
  g.fillText(ctaLabel, W/2, ctaY + ctaH/2 + 2);

  // ======== back-of-poster preview strip (top 100px is the "back") ========
  // redraw a narrow strip at very top as the "reverse" — bone-on-pitch with just the year quietly.
  // This is the tiny sliver visible when poster is receded in stack.
  g.save();
  const STRIP = 240;
  g.fillStyle = entry.tone === 'bone' ? '#EDE6D5' : '#0D0B12';
  g.fillRect(0, 0, W, STRIP);
  // grain
  for (let i = 0; i < 1800; i++) {
    const aa = Math.random()*0.03;
    g.fillStyle = `rgba(${entry.tone==='bone'?0:255},${entry.tone==='bone'?0:255},${entry.tone==='bone'?0:255},${aa})`;
    g.fillRect(Math.random()*W, Math.random()*STRIP, 1, 1);
  }
  // hairline bottom of strip
  g.strokeStyle = entry.tone === 'bone' ? '#141018' : '#2A2631';
  g.lineWidth = 1;
  g.beginPath(); g.moveTo(0, STRIP - 0.5); g.lineTo(W, STRIP - 0.5); g.stroke();
  // quiet year on the back strip
  g.fillStyle = entry.tone === 'bone' ? '#141018' : '#4A4450';
  g.font = '500 48px "Azeret Mono", monospace';
  g.textAlign = 'left'; g.textBaseline = 'middle';
  g.fillText(entry.type === 'about' ? '— HELLO · ALEXANDRE' : '— VERSO · ' + entry.year, 64, STRIP/2);
  // markers
  g.textAlign = 'right';
  g.fillText(entry.num, W - 64, STRIP/2);
  g.restore();

  const tex = new THREE.CanvasTexture(c);
  tex.anisotropy = 16;
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.needsUpdate = true;
  return tex;
}

// ----- three setup -----
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.NoToneMapping;

const scene = new THREE.Scene();
scene.background = new THREE.Color(C.pitch);

const camera = new THREE.PerspectiveCamera(38, innerWidth/innerHeight, 0.1, 50);
camera.position.set(0, 0.1, 5.3);
camera.lookAt(0, 0.1, 0);

// subtle radial vignette-inverse via a large plane behind stack (barely visible)
{
  const glowTex = (() => {
    const s = 512;
    const c = document.createElement('canvas'); c.width = c.height = s;
    const gg = c.getContext('2d');
    const rg = gg.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
    rg.addColorStop(0, 'rgba(106,46,255,0.12)');
    rg.addColorStop(0.4, 'rgba(106,46,255,0.04)');
    rg.addColorStop(1, 'rgba(8,8,13,0)');
    gg.fillStyle = rg; gg.fillRect(0,0,s,s);
    const t = new THREE.CanvasTexture(c); return t;
  })();
  const glowMat = new THREE.MeshBasicMaterial({ map: glowTex, transparent: true, depthWrite: false });
  const glow = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), glowMat);
  glow.position.z = -2;
  scene.add(glow);
}

// ----- build posters -----
const POSTER_W = 1.45, POSTER_H = POSTER_W * 1.5; // 2:3 aspect (1.45 × 2.175)
const geom = new THREE.PlaneGeometry(POSTER_W, POSTER_H, 1, 1);

const posters = ENTRIES.map((entry, i) => {
  const tex = makePosterTexture(entry);
  const mat = new THREE.MeshBasicMaterial({
    map: tex, transparent: true, opacity: 1, depthWrite: false,
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.renderOrder = 100 - i; // draw lower indices on top initially
  scene.add(mesh);
  return { entry, mesh, mat, i };
});

// ----- pointer + state -----
const cursorEl   = document.getElementById('cursor');
const hintCenter = document.getElementById('hintCenter');
const stackHead  = document.getElementById('stackHead');
const stackDots  = Array.from(document.querySelectorAll('.stack-indicator .dots span'));

let targetMouseY = 0;   // scrub target in [0,1] — driven by drag, not cursor
let mouseY       = 0;   // lerped toward targetMouseY
let interacted   = false;

// drag state
let isDragging        = false;
let dragPointerId     = null;
let dragStartClientY  = 0;
let dragStartScrub    = 0;
let dragMoved         = false;
let downAt            = 0;
let downScreen        = { x: 0, y: 0 };
let downPosterIndex   = -1;
const DRAG_PX_PER_CARD = 260;        // how many px of drag = 1 card
const CLICK_MAX_PX     = 7;
const CLICK_MAX_MS     = 360;

const N = posters.length;

// ----- compute transform state by offset from active -----
// offset > 0: poster is BELOW/BEHIND active in stack (peeking from rear)
// offset = 0: active (front-center)
// offset < 0: poster is ABOVE/PAST active (rising up & out)
function stateForOffset(o) {
  const s = { x:0, y:0, z:0, rotX:0, scale:1, opacity:1, renderOrder: 100 - Math.abs(o)*2 };
  if (o >= 0) {
    // in stack behind active (peeking above active since we want the top edge to show)
    s.y       = o * 0.14;           // slightly above (top strip peeks above the front poster)
    s.z       = -o * 0.34;          // recedes
    s.scale   = Math.max(0.76, 1 - o * 0.07);
    s.opacity = Math.max(0.3, 1 - o * 0.38);
    s.rotX    = 0;
  } else {
    const a = -o;
    // rising up, tipping forward, fading
    s.y       = a * 2.6;
    s.z       = a * 0.35;
    s.rotX    = -a * 0.55;
    s.scale   = Math.max(0.7,  1 - a * 0.04);
    s.opacity = Math.max(0,    1 - a * 0.85);
  }
  return s;
}

// apply state to mesh
function applyState(m, s) {
  m.mesh.position.set(s.x, s.y, s.z);
  m.mesh.rotation.x = s.rotX;
  m.mesh.scale.setScalar(s.scale);
  m.mat.opacity = s.opacity;
  m.mesh.renderOrder = s.renderOrder;
  m.mesh.visible = s.opacity > 0.01;
}

// determine active poster from fractional stackPos
function activeIndex(stackPos) {
  return Math.round(Math.max(0, Math.min(N - 1, stackPos)));
}

// ----- cursor movement -----
const trailCanvas = document.getElementById('cursor-trail');
const tctx = trailCanvas.getContext('2d');
function sizeTrail() {
  trailCanvas.width  = innerWidth  * devicePixelRatio;
  trailCanvas.height = innerHeight * devicePixelRatio;
  trailCanvas.style.width  = innerWidth  + 'px';
  trailCanvas.style.height = innerHeight + 'px';
}
sizeTrail();
const trail = [];
function pushTrail(x, y) {
  trail.push({ x, y, t: performance.now() });
  if (trail.length > 20) trail.shift();
}

let lastScreen = { x: innerWidth/2, y: innerHeight/2 };

window.addEventListener('pointermove', (e) => {
  lastScreen.x = e.clientX;
  lastScreen.y = e.clientY;
  cursorEl.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%,-50%)`;
  pushTrail(e.clientX, e.clientY);

  if (isDragging && e.pointerId === dragPointerId) {
    const deltaY     = dragStartClientY - e.clientY;      // up = positive
    const deltaScrub = (deltaY / DRAG_PX_PER_CARD) / (N - 1);
    targetMouseY = Math.max(0, Math.min(1, dragStartScrub + deltaScrub));
    const mx = Math.abs(e.clientX - downScreen.x);
    const my = Math.abs(e.clientY - downScreen.y);
    if (Math.hypot(mx, my) > CLICK_MAX_PX) dragMoved = true;
  }
});

function raycastPoster(x, y) {
  const ndc = new THREE.Vector2(
    (x / innerWidth) * 2 - 1,
    -(y / innerHeight) * 2 + 1
  );
  const ray = new THREE.Raycaster();
  ray.setFromCamera(ndc, camera);
  const hits = ray.intersectObjects(posters.map(p => p.mesh), false);
  if (!hits.length) return null;
  return posters.find(p => p.mesh === hits[0].object);
}

// pointerdown: start potential drag (and remember which poster was pressed, for click-routing on release)
canvas.addEventListener('pointerdown', (e) => {
  canvas.setPointerCapture(e.pointerId);
  spawnRipple(e.clientX, e.clientY);
  if (!interacted) { interacted = true; hintCenter.classList.remove('show'); }

  isDragging       = true;
  dragPointerId    = e.pointerId;
  dragStartClientY = e.clientY;
  dragStartScrub   = targetMouseY;
  dragMoved        = false;
  downAt           = performance.now();
  downScreen       = { x: e.clientX, y: e.clientY };

  const hit = raycastPoster(e.clientX, e.clientY);
  downPosterIndex = hit ? hit.i : -1;

  cursorEl.classList.add('grab');
});

function finishPointer(e) {
  if (!isDragging || e.pointerId !== dragPointerId) return;
  const duration = performance.now() - downAt;
  const isClick = !dragMoved && duration < CLICK_MAX_MS;

  if (isClick) {
    // tap/click: route by what was pressed
    if (downPosterIndex >= 0) {
      const active = activeIndex(mouseY * (N - 1));
      if (downPosterIndex === active) {
        const m = posters[downPosterIndex];
        const flash = document.createElement('div');
        flash.style.cssText = `position:fixed;inset:0;background:${C.bone};z-index:150;pointer-events:none;opacity:0.85;transition:opacity 260ms ease;`;
        document.body.appendChild(flash);
        requestAnimationFrame(() => flash.style.opacity = '0');
        setTimeout(() => flash.remove(), 320);
        if (m.entry.href && m.entry.href !== '#') {
          window.open(m.entry.href, '_blank', 'noopener,noreferrer');
        }
      } else {
        // jump to clicked poster
        targetMouseY = downPosterIndex / (N - 1);
      }
    }
  } else {
    // released after drag: snap to nearest
    const pos = targetMouseY * (N - 1);
    const snapped = Math.round(pos);
    targetMouseY = snapped / (N - 1);
  }

  isDragging = false;
  dragPointerId = null;
  cursorEl.classList.remove('grab');
}

canvas.addEventListener('pointerup',     finishPointer);
canvas.addEventListener('pointercancel', finishPointer);

function spawnRipple(x, y) {
  const r = document.createElement('span');
  r.className = 'ripple';
  r.style.left = x + 'px';
  r.style.top  = y + 'px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 460);
}

// keyboard
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp')   { targetMouseY = Math.min(1, Math.round(mouseY * (N-1) + 1) / (N-1)); }
  if (e.key === 'ArrowDown') { targetMouseY = Math.max(0, Math.round(mouseY * (N-1) - 1) / (N-1)); }
  if (e.key === 'Enter') {
    const m = posters[activeIndex(mouseY * (N-1))];
    if (m?.entry?.href && m.entry.href !== '#') window.open(m.entry.href, '_blank', 'noopener');
  }
});

// hover raycast for cursor state
function updateHoverState() {
  if (isDragging) return; // grab class is authoritative during drag
  const ndc = new THREE.Vector2(
    (lastScreen.x / innerWidth) * 2 - 1,
    -(lastScreen.y / innerHeight) * 2 + 1
  );
  const ray = new THREE.Raycaster();
  ray.setFromCamera(ndc, camera);
  const stackPos = mouseY * (N - 1);
  const active = activeIndex(stackPos);
  const activeMesh = posters[active]?.mesh;
  if (!activeMesh) { cursorEl.classList.remove('hover'); return; }
  const hit = ray.intersectObject(activeMesh, false);
  cursorEl.classList.toggle('hover', hit.length > 0);
}

// ----- trail draw -----
function drawTrail() {
  tctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  tctx.clearRect(0, 0, innerWidth, innerHeight);
  const now = performance.now();
  tctx.strokeStyle = '#D8FF00';
  tctx.lineWidth = 1;
  for (let i = 1; i < trail.length; i++) {
    const a = trail[i-1], b = trail[i];
    const age = (now - b.t) / 400;
    if (age > 1) continue;
    tctx.globalAlpha = (1 - age) * 0.5;
    tctx.beginPath(); tctx.moveTo(a.x, a.y); tctx.lineTo(b.x, b.y); tctx.stroke();
  }
  tctx.globalAlpha = 1;
}

// ----- post-processing -----
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.48, 0.55, 0.86);
composer.addPass(bloom);

const chromaGrain = {
  uniforms: {
    tDiffuse:  { value: null },
    uTime:     { value: 0 },
    uChroma:   { value: 0.0015 },
    uGrain:    { value: 0.05 },
    uVignette: { value: 0.75 },
    uResolution:{ value: new THREE.Vector2(innerWidth, innerHeight) },
  },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse; uniform float uTime; uniform float uChroma; uniform float uGrain; uniform float uVignette; uniform vec2 uResolution;
    varying vec2 vUv;
    float hash(vec2 p){ p=fract(p*vec2(233.34,851.73)); p+=dot(p,p+23.45); return fract(p.x*p.y); }
    void main(){
      vec2 uv=vUv; vec2 d=uv-0.5; float r=length(d);
      float a=uChroma*(0.3+r*1.8);
      float R=texture2D(tDiffuse,uv+d*a).r;
      vec4  G=texture2D(tDiffuse,uv);
      float B=texture2D(tDiffuse,uv-d*a).b;
      vec3 c=vec3(R,G.g,B);
      vec2 gg=floor(uv*uResolution/1.2);
      float n=hash(gg+mod(uTime*24.,1000.));
      c += (n-0.5)*uGrain;
      float v=smoothstep(1.15,0.35,r*1.55);
      c*=mix(1.,v,uVignette);
      gl_FragColor=vec4(c,1.);
    }
  `,
};
const chromaPass = new ShaderPass(chromaGrain);
composer.addPass(chromaPass);
composer.addPass(new OutputPass());

if (innerWidth < 640) {
  bloom.strength = 0.3;
  chromaPass.uniforms.uChroma.value = 0.0008;
  chromaPass.uniforms.uGrain.value  = 0.03;
}

// ----- resize -----
addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  bloom.setSize(innerWidth, innerHeight);
  chromaPass.uniforms.uResolution.value.set(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  sizeTrail();
});

// ----- indicator UI -----
function updateIndicator() {
  const stackPos = mouseY * (N - 1);
  // head y position in .line (0-110px)
  const headPct = (stackPos / (N - 1));
  stackHead.style.top = (headPct * 100) + '%';
  const active = activeIndex(stackPos);
  stackDots.forEach(d => d.classList.toggle('active', +d.dataset.i === active));
}

// ----- main loop -----
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

function tick() {
  requestAnimationFrame(tick);
  const now = performance.now();

  // lerp mouseY → targetMouseY (damped follow)
  mouseY += (targetMouseY - mouseY) * (reduceMotion ? 1 : 0.085);

  // stackPos maps to which poster is active (0 .. N-1)
  const stackPos = mouseY * (N - 1);

  // apply transforms
  for (const p of posters) {
    const offset = p.i - stackPos;
    const s = stateForOffset(offset);
    // subtle idle breath on active poster
    if (!reduceMotion && Math.abs(offset) < 0.25) {
      const t = now / 1000;
      s.y     += Math.sin(t * 0.8) * 0.008;
      s.rotX  += Math.sin(t * 0.6) * 0.006;
    }
    applyState(p, s);
  }

  updateHoverState();
  updateIndicator();
  drawTrail();

  chromaPass.uniforms.uTime.value = now / 1000;
  composer.render();
}

// ----- reveal & start -----
requestAnimationFrame(() => {
  document.getElementById('boot').classList.add('done');
  tick();
  setTimeout(() => { if (!interacted) hintCenter.classList.add('show'); }, 700);
});
</script>

</body>
